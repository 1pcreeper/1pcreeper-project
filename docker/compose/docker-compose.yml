        ports:
            - 5435:5432
        expose:
            - "5432"
        environment:
            POSTGRES_USER: ${DOCKER_USER_PAYMENT_DB_POSTGRES_USER}
            POSTGRES_PASSWORD: ${DOCKER_USER_PAYMENT_DB_POSTGRES_PASSWORD}
            POSTGRES_DB: ${DOCKER_USER_PAYMENT_DB_POSTGRES_DB}
        volumes:
