services:
    # Services ============================================================================================
    user_account_db:
        container_name: user_account_db
        hostname: user_account_db
        build:
            context: ./docker/dockerfile/user_account_db
            dockerfile: Dockerfile
        ports:
            - 5432:5432
        expose:
            - "5432"
        environment:
            POSTGRES_USER: ${DOCKER_USER_ACCOUNT_DB_POSTGRES_USER}
            POSTGRES_PASSWORD: ${DOCKER_USER_ACCOUNT_DB_POSTGRES_PASSWORD}
            POSTGRES_DB: ${DOCKER_USER_ACCOUNT_DB_POSTGRES_DB}
        volumes:
            - ./docker/volume/user_account_db:/var/shared/postgresql/data
        networks:
            - user_network
        restart: always
        stdin_open: true
        tty: true
    user_mission_db:
        container_name: user_mission_db
        hostname: user_mission_db
        build:
            context: ./docker/dockerfile/user_mission_db
            dockerfile: Dockerfile
        ports:
