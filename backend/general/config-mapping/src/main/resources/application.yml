server:
    port: ${GENERAL_CONFIG_MAPPING_SERVER_PORT}
spring:
  application:
    name: general-config-mapping
  cloud:
      config:
          server:
              git:
                  uri: ${GENERAL_CONFIG_MAPPING_GIT_URI}
                  clone-on-start: true
eureka:
    instance:
        prefer-ip-address: false
    client:
        register-with-eureka: true
        fetch-registry: true
        serviceUrl:
            defaultZone: http://${GENERAL_SERVICE_REGISTRY_SERVER_IP_ADDRESS}:${GENERAL_SERVICE_REGISTRY_SERVER_PORT}/eureka
