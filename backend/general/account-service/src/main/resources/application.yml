server:
    port: ${GENERAL_ACCOUNT_SERVICE_SERVER_PORT}
    servlet:
        context-path: ${GENERAL_ACCOUNT_SERVICE_CONTEXT_PATH}
spring:
    application:
        name: general-account-service
    jpa:
        hibernate.ddl-auto: none
        properties.hibernate.jdbc.time_zone: ${GENERAL_ACCOUNT_SERVICE_JPA_TIMEZONE}
    datasource:
        url: jdbc:postgresql://${GENERAL_ACCOUNT_SERVICE_DATASOURCE_DB_URL}:${GENERAL_ACCOUNT_SERVICE_DATASOURCE_DB_PORT}/${GENERAL_ACCOUNT_SERVICE_DATASOURCE_DB_SCHEMA}
        username: ${GENERAL_ACCOUNT_SERVICE_DATASOURCE_USERNAME}
        password: ${GENERAL_ACCOUNT_SERVICE_DATASOURCE_PASSWORD}
        driver-class-name: org.postgresql.Driver
        liquibase:
            change-log: classpath:db/changelog/db.changelog-master.yaml
    config:
        import: configserver:http://${GENERAL_CONFIG_MAPPING_SERVER_IP_ADDRESS}:${GENERAL_CONFIG_MAPPING_SERVER_PORT}
    cloud:
        config:
            username: ${GENERAL_CONFIG_MAPPING_SECURITY_USERNAME}
            password: ${GENERAL_CONFIG_MAPPING_SECURITY_PASSWORD}
properties:
    security: dummy
grpc:
    server:
        port: ${GENERAL_ACCOUNT_SERVICE_GRPC_PORT}