
syntax = "proto3";

package useraccount;
option java_multiple_files = true;
option java_package="com.birby.project.user_shared_library.grpc";
option java_outer_classname="UserAccountServiceProto";

service UserRPCService{
  rpc findByIdPublic(UserIdRequest) returns (UserPublicResponse);
  rpc findByNamePublic(UserSearchRequest) returns (UserPublicResponse);
  rpc searchAnyPublic(UserSearchRequest) returns (UserPublicResponse);
}
service RoleRPCService{
    rpc findById(RoleIdRequest) returns (RoleResponse);
}
service BusinessRPCService{
    rpc findById(IdRequest) returns (BusinessResponse);
}
service UserContactRPCService{
    rpc findMainByUserId(UserIdRequest) returns (UserContactResponse);
}
service BusinessContactRPCService{
    rpc findMainByBusinessId(UserIdRequest) returns (BusinessContactResponse);
}

service AccountVerifyManagerRPCService{
    rpc verifyUserForRoleV1(VerifyUserForRoleRequest) returns (VerifyResponse);
    rpc verifyUserForBusinessManagerV1(VerifyUserForBusinessManagerRequest) returns (VerifyResponse);
    rpc verifyUserForBusinessRightsV1(VerifyUserForBusinessRightsRequest) returns (VerifyResponse);
}
//====================================================================================================
message IdRequest{
    string id = 1;
}
message UserIdRequest{
  string id = 1;
}
message RoleIdRequest{
    string id = 1;
}
message UserSearchRequest{
    string query = 1;
}
message VerifyUserForRoleRequest{
    string userId = 1;
    repeated string roleIds = 2;
}
message VerifyUserForBusinessManagerRequest{
    string userId = 1;
    string businessId = 2;
}
message VerifyUserForBusinessRightsRequest{
    string userId = 1;
    string businessId = 2;
    repeated string rightIds = 3;
}
//====================================================================================================
message UserPublicResponse{
  string id = 1;
  string name = 2;
  string displayName = 3;
}
message RoleResponse{
    string id = 1;
    string name = 2;
    string chineseName = 3;
    string createdAt = 4;
}
message BusinessResponse{
    string id = 1;
    string businessTypeId = 2;
    string name = 3;
    string createdAt = 4;
    bool isActive = 5;
}
message UserContactResponse{
    string id = 1;
    string phoneHk = 2;
    string phoneCn = 3;
    string email = 4;
    string whatsapp = 5;
    string wechat = 6;
    string instagram = 7;
    string website = 8;
}
message BusinessContactResponse{
    string id = 1;
    string phoneHk = 2;
    string phoneCn = 3;
    string email = 4;
    string whatsapp = 5;
    string wechat = 6;
    string instagram = 7;
    string website = 8;
    string address = 9;
}
//========================================================================================================
message VerifyResponse{
    bool isVerified = 1;
}
message RoleListResponse{
    repeated RoleResponse roles = 1;
}